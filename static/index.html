<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocQuery</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F7F5;
    --surface: #FFFFFF;
    --border: #E8E8E4;
    --border-hover: #D0D0C8;
    --text: #1A1A18;
    --text-muted: #888884;
    --text-hint: #B8B8B4;
    --accent-bg: #1A1A18;
    --accent-text: #FFFFFF;
    --blue: #2563EB;
    --blue-bg: #EFF6FF;
    --radius: 10px;
    --radius-sm: 6px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: 260px; height: 100vh; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
  .logo { font-size: 15px; font-weight: 500; letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; background: var(--accent-bg); border-radius: 50%; }
  .sidebar-label { font-size: 11px; font-weight: 500; color: var(--text-hint); letter-spacing: 0.5px; text-transform: uppercase; padding: 16px 20px 8px; }
  .doc-list { padding: 0 12px; flex: 1; overflow-y: auto; }
  .doc-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.15s; margin-bottom: 2px; }
  .doc-item:hover { background: var(--bg); }
  .doc-icon { width: 28px; height: 28px; border-radius: 6px; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text-muted); }
  .doc-name { font-size: 13px; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-size { font-size: 11px; color: var(--text-hint); white-space: nowrap; }
  .doc-empty { font-size: 13px; color: var(--text-hint); padding: 12px 10px; }

  .upload-wrapper { padding: 12px; }
  .upload-area { border: 1.5px dashed var(--border-hover); border-radius: var(--radius); padding: 16px; text-align: center; cursor: pointer; transition: all 0.15s; }
  .upload-area:hover { border-color: var(--text-muted); background: var(--bg); }
  .upload-area.dragover { border-color: var(--blue); background: var(--blue-bg); }
  .upload-icon { font-size: 20px; margin-bottom: 6px; color: var(--text-muted); }
  .upload-text { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .upload-text strong { color: var(--text); font-weight: 500; }
  #file-input { display: none; }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .topbar { padding: 14px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); flex-shrink: 0; }
  .topbar-title { font-size: 14px; font-weight: 500; }
  .topbar-meta { font-size: 12px; color: var(--text-hint); display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #22C55E; }
  .status-dot.inactive { background: var(--border-hover); }

  .chat-area { flex: 1; overflow-y: auto; padding: 28px; display: flex; flex-direction: column; gap: 20px; }

  /* EMPTY STATE */
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text-hint); text-align: center; padding: 40px; }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text-muted); }
  .empty-sub { font-size: 13px; line-height: 1.5; max-width: 300px; }
  .suggestion-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 12px; }
  .suggestion { font-size: 12px; color: var(--text-muted); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; cursor: pointer; transition: all 0.15s; }
  .suggestion:hover { border-color: var(--text-muted); color: var(--text); }

  /* MESSAGES */
  .message { display: flex; gap: 12px; max-width: 720px; animation: fadein 0.2s ease; }
  .message.user { flex-direction: row-reverse; align-self: flex-end; }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }
  .avatar.ai { background: var(--accent-bg); color: var(--accent-text); }
  .avatar.user { background: var(--border); color: var(--text-muted); }
  .bubble { padding: 11px 15px; border-radius: 12px; font-size: 14px; line-height: 1.65; max-width: 560px; }
  .bubble.ai { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 4px 12px 12px 12px; }
  .bubble.user { background: var(--accent-bg); color: var(--accent-text); border-radius: 12px 4px 12px 12px; }
  .bubble.thinking { color: var(--text-hint); font-style: italic; }
  .source-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .chip { font-size: 11px; color: var(--blue); background: var(--blue-bg); padding: 3px 8px; border-radius: 20px; font-family: 'DM Mono', monospace; }

  /* UPLOADING TOAST */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--accent-bg); color: var(--accent-text); font-size: 13px; padding: 8px 16px; border-radius: 20px; display: none; z-index: 100; }
  .toast.show { display: block; animation: fadein 0.2s ease; }

  /* INPUT */
  .input-area { padding: 12px 28px 20px; flex-shrink: 0; }
  .input-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: flex-end; gap: 8px; padding: 10px 12px; transition: border-color 0.15s; max-width: 720px; }
  .input-box:focus-within { border-color: var(--border-hover); }
  textarea { flex: 1; border: none; outline: none; resize: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); line-height: 1.5; max-height: 120px; min-height: 24px; }
  textarea::placeholder { color: var(--text-hint); }
  .send-btn { width: 32px; height: 32px; border-radius: 8px; background: var(--accent-bg); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s; }
  .send-btn:hover { opacity: 0.75; }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .send-btn svg { width: 14px; height: 14px; fill: white; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-dot"></div>
      DocQuery
    </div>
  </div>
  <div class="sidebar-label">Documents</div>
  <div class="doc-list" id="doc-list">
    <div class="doc-empty">No documents yet</div>
  </div>
  <div class="upload-wrapper">
    <div class="upload-area" id="upload-area">
      <div class="upload-icon">↑</div>
      <div class="upload-text"><strong>Upload PDF</strong><br>drag & drop or click</div>
      <input type="file" id="file-input" accept=".pdf" multiple>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">DocQuery</div>
    <div class="topbar-meta">
      <div class="status-dot inactive" id="status-dot"></div>
      <span id="status-text">No documents indexed</span>
    </div>
  </div>

  <div class="chat-area" id="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="empty-title">Ask your documents anything</div>
      <div class="empty-sub">Upload a PDF to get started, then ask questions about its contents.</div>
      <div class="suggestion-grid">
        <div class="suggestion" onclick="fillSuggestion(this)">What are the key terms?</div>
        <div class="suggestion" onclick="fillSuggestion(this)">Summarize this document</div>
        <div class="suggestion" onclick="fillSuggestion(this)">What are the termination clauses?</div>
        <div class="suggestion" onclick="fillSuggestion(this)">List all obligations</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="query-input" placeholder="Ask a question about your documents..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendQuery()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = '';
  let docCount = 0;

  // Upload area
  const uploadArea = document.getElementById('upload-area');
  const fileInput = document.getElementById('file-input');

  uploadArea.addEventListener('click', () => fileInput.click());
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    [...e.dataTransfer.files].forEach(uploadFile);
  });
  fileInput.addEventListener('change', () => [...fileInput.files].forEach(uploadFile));

  async function uploadFile(file) {
    if (!file.name.endsWith('.pdf')) return showToast('Only PDF files are supported');
    showToast(`Uploading ${file.name}...`);
    const form = new FormData();
    form.append('file', file);
    try {
      const res = await fetch(`${API}/upload`, { method: 'POST', body: form });
      const data = await res.json();
      docCount++;
      addDocToSidebar(file.name, file.size);
      updateStatus();
      showToast(`Indexed ${file.name} — ${data.chunks} chunks`);
    } catch (e) {
      showToast('Upload failed. Is the server running?');
    }
  }

  function addDocToSidebar(name, size) {
    const list = document.getElementById('doc-list');
    const empty = list.querySelector('.doc-empty');
    if (empty) empty.remove();
    const kb = Math.round(size / 1024);
    const item = document.createElement('div');
    item.className = 'doc-item';
    item.innerHTML = `<div class="doc-icon">PDF</div><span class="doc-name">${name}</span><span class="doc-size">${kb}k</span>`;
    list.appendChild(item);
  }

  function updateStatus() {
    document.getElementById('status-dot').className = 'status-dot';
    document.getElementById('status-text').textContent = `${docCount} document${docCount !== 1 ? 's' : ''} indexed`;
  }

  // Chat
  async function sendQuery() {
    const input = document.getElementById('query-input');
    const question = input.value.trim();
    if (!question) return;
    if (docCount === 0) return showToast('Upload a document first');

    document.getElementById('empty-state')?.remove();
    appendMessage('user', question);
    input.value = '';
    autoResize(input);

    const thinkingId = appendMessage('ai', 'Searching documents...', true);
    document.getElementById('send-btn').disabled = true;

    try {
      const res = await fetch(`${API}/query?question=${encodeURIComponent(question)}`, { method: 'POST' });
      const data = await res.json();
      document.getElementById(thinkingId)?.remove();
      appendMessage('ai', data.answer);
    } catch (e) {
      document.getElementById(thinkingId)?.remove();
      appendMessage('ai', 'Something went wrong. Please try again.');
    }
    document.getElementById('send-btn').disabled = false;
  }

  function appendMessage(role, text, thinking = false) {
    const area = document.getElementById('chat-area');
    const id = 'msg-' + Date.now();
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.id = id;
    div.innerHTML = `
      <div class="avatar ${role}">${role === 'ai' ? 'AI' : 'G'}</div>
      <div class="bubble ${role}${thinking ? ' thinking' : ''}">${text}</div>
    `;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return id;
  }

  function fillSuggestion(el) {
    document.getElementById('query-input').value = el.textContent;
    document.getElementById('query-input').focus();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
